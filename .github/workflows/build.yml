name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build .\LaptopSessionViewer.csproj -c Release

      - name: Publish
        run: dotnet publish .\LaptopSessionViewer.csproj -c Release -r win-x64 --self-contained false -o .\publish\win-x64

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIHelper-win-x64
          path: .\publish\win-x64
          if-no-files-found: error
